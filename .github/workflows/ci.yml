name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  deps:
    name: Dependency Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-deps
      - name: Setup environment
        run: mise run setup
      - name: Run dependency checks
        run: mise run deps-check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-lint
      - name: Setup environment
        run: mise run setup
      - name: Run lint suite
        run: mise run lint-all

  test:
    name: Test Suite
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-test
      - name: Setup environment
        run: mise run setup
      - name: Run full test suite
        if: runner.os != 'Windows'
        shell: bash
        run: mise run test
      - name: Run Rust workspace tests
        if: runner.os == 'Windows'
        shell: bash
        run: mise x -- cargo test --workspace

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-coverage
      - name: Setup environment
        run: mise run setup
      - name: Generate coverage
        run: mise run rust:coverage
      - name: Upload to codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
      - name: Upload HTML report artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: target/llvm-cov/html/

  cross-compile:
    name: Cross Compile
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            build_python_bindings: false
          - target: aarch64-unknown-linux-gnu
            build_python_bindings: true
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-cross-${{ matrix.target }}
      - name: Install cross
        run: cargo install cross --locked
      - name: Setup environment
        run: mise run setup
      - name: Cross compile and test portable crates
        run: cross test --release --all-features --workspace --exclude secure-tunnel-py --target ${{ matrix.target }}
      - name: Cross compile Python bindings
        if: matrix.build_python_bindings
        env:
          PYO3_BUILD_EXTENSION_MODULE: 1
        run: cross build --release --all-features -p secure-tunnel-py --target ${{ matrix.target }}
